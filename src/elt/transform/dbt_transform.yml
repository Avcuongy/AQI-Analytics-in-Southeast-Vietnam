name: "dbt_transform"
version: "1.0.0"
profile: "profiles"

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

models:
  dbt_transform:
    staging:
      +materialized: view
      +schema: staging

    marts:
      +materialized: table
      +schema: marts

snapshots:
  dbt_transform:
    +target_schema: snapshots
    +strategy: check
    +check_cols: all

vars:
  staging_path: "../../../data/staging"
